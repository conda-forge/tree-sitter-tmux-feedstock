schema_version: 1

context:
  version: "0.1.1"

package:
  name: tree-sitter-tmux
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tree-sitter-tmux/tree_sitter_tmux-${{ version }}.tar.gz
  sha256: 37f041e870bd7d176d51b636676834c4e6221b46ee27317f95b11b0cfda1b3c2

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - if: build_platform != target_platform
      then:
        - cross-python_${{ target_platform }}
        - python
  host:
    - python
    - setuptools >=42
    - wheel
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_tmux
  - requirements:
      run:
        - pip
        - python
    script:
      - pip check

about:
  summary: Tmux grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Freed-Wu/tree-sitter-tmux

extra:
  recipe-maintainers:
    - danielnachun
